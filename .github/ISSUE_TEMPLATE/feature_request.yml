name: ✨ Feature Request
description: Propose a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## ✨ Feature Request

        Thanks for the idea! Please be as detailed as possible.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Describe the pain point.
      placeholder: |
        Currently, when I want to ..., I have to ...
        This is frustrating because ...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe how you'd like this to work. Include CLI usage examples if relevant.
      placeholder: |
        ```bash
        issgo command --new-flag "description"
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches have you thought about? Are there workarounds today?
    validations:
      required: false

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      description: Which part of IssGo does this affect?
      options:
        - CLI Commands
        - LLM / Model Integration
        - Built-in Tools
        - Agent / Planner / Memory
        - Server / API
        - Configuration
        - Documentation
        - Other
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Estimated Difficulty
      options:
        - "⭐ Easy (few lines, well-scoped)"
        - "⭐⭐ Medium (may touch multiple files)"
        - "⭐⭐⭐ Hard (architectural changes needed)"
    validations:
      required: false

  - type: textarea
    id: additional
    attributes:
      label: Additional Context
      description: Screenshots, references, links to similar features in other projects
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-submission Checklist
      options:
        - label: I searched existing issues and this is not a duplicate
          required: true
        - label: This feature aligns with IssGo's goal of being an AI automation CLI
          required: true
