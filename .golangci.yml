linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports

linters-settings:
  errcheck:
    check-blank: true

issues:
  exclude-use-default: false
  exclude-rules:
    - linters:
        - errcheck
      text: "Error return value of .*(w\\.Write|Encode|MkdirAll|filepath\\.Walk|MarkFlagRequired|Shutdown|watcher\\.Add|watcher\\.Close|\\.Body\\.Close|stream\\.Close|fi\\.Close|fmt\\.Fprintf|tmpl\\.Execute|rand\\.Read|json\\.Marshal|json\\.MarshalIndent|Log\\.Sync|os\\.UserHomeDir|os\\.Getwd|filepath\\.Abs|filepath\\.Rel|e\\.Info|\\.Info\\(\\)|http\\.NewRequestWithContext|io\\.ReadAll).* is not checked"
